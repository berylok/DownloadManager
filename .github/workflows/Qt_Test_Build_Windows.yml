name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (MinGW) - no modules
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: 'win64_mingw'
          # 不写 modules，让基础包自带 qtbase 和 qttools
          cache: 'true'
          aqtversion: '==3.1.*'

      - name: Setup MinGW PATH
        run: |
          $mingwPath = Get-ChildItem -Path "${{ env.Qt6_DIR }}/../../Tools" -Filter "mingw*_64" -Directory | Select-Object -First 1
          echo "$($mingwPath.FullName)/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          g++ --version

      - name: Configure CMake
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          windeployqt --release --no-translations build/DownloadManager.exe
          Compress-Archive -Path build/* -DestinationPath DownloadManager-Windows.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Windows
          path: DownloadManager-Windows.zip
