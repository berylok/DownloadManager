name: Windows Build (Qt 6.8.3 + MSVC 2022 + vcpkg)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      # 1. 检出代码（Git 已预装）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Qt 6.8.3（MSVC 2022 64位）
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase qttools'
          cache: 'true'

      # 3. 设置 vcpkg
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      # 4. 配置 MSVC 2022 环境
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # 5. 配置 CMake 项目
      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TOOLCHAIN_FILE }}"

      # 6. 编译项目
      - name: Build Project
        run: cmake --build build --config Release --parallel

      # 7. 打包（使用 windeployqt 复制 Qt 依赖）
      - name: Package with windeployqt
        shell: pwsh
        run: |
          windeployqt --release --no-translations build\Release\DownloadManager.exe
          Compress-Archive -Path build\Release\* -DestinationPath DownloadManager-Windows.zip

      # 8. 上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Windows-MSVC
          path: DownloadManager-Windows.zip
