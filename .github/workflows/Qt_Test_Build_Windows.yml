name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      # 使用 aqtinstall 的 v3 版本，兼容性更好
      - name: Install Qt using aqtinstall
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: 'win64_mingw81'          # ✅ 这是正确的架构名
          modules: 'qtbase qttools'
          cache: 'true'
          aqtversion: '==3.1.*'          # 锁定 aqt 版本，避免新版行为变化

      # 设置 MinGW 路径（与架构名匹配）
      - name: Setup MinGW
        run: |
          $mingwPath = "${{ env.Qt6_DIR }}/../../Tools/mingw810_64/bin"
          echo "$mingwPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          g++ --version

      - name: Configure CMake
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          windeployqt --release --no-translations build/DownloadManager.exe
          Compress-Archive -Path build/* -DestinationPath DownloadManager-Windows.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Windows
          path: DownloadManager-Windows.zip
