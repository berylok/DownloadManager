name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: [windows-latest, windows-2019, windows-2022]
    # windows-2019  # 或 windows-latest，或 windows-2022，看你需要什么VS版本
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install aqtinstall
        run: python -m pip install aqtinstall

      - name: Install Qt
        run: |
          aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 -m qtbase qttools qtdeclarative
        # 根据你的工程需要，添加更多模块，比如 qtwebengine、qtcharts 等

      - name: Set Qt env
        shell: pwsh
        run: |
          echo "C:\Qt\6.5.3\msvc2019_64\bin" | Out-File -Append -Encoding ascii $env:GITHUB_PATH

      - name: Configure with CMake
        run: |
          cmake -S . -B build -G "NMake Makefiles" -DCMAKE_PREFIX_PATH="C:\Qt\6.5.3\msvc2019_64"

      - name: Build
        run: |
          cmake --build build --config Release
