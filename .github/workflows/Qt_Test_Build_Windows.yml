name: Qt Windows MinGW Example

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          modules: 'qtcharts qtwebengine'
          # 官方推荐显式指定工具链和架构，避免自动检测失败
          tools: 'tools_mingw,90,qt.tools.win64_mingw900'

      - name: Build
        shell: pwsh
        run: |
          # 将 Qt 和 MinGW 加入 PATH
          $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
          
          cmake -S . -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --parallel

      - name: Deploy Qt Dependencies (windeployqt)
        run: |
          # 假设你的可执行文件名为 my_app.exe，位于 build/Release/
          $exePath = "build\Release\my_app.exe"
          
          # 使用 windeployqt 自动复制所需 dll
          windeployqt --release --no-translations --no-compiler-runtime "$exePath"
          
          # 可选：手动复制 MinGW 运行时库（如果 windeployqt 没带上）
          Copy-Item "C:\msys64\mingw64\bin\libgcc_s_seh-1.dll" -Destination "build\Release\"
          Copy-Item "C:\msys64\mingw64\bin\libstdc++-6.dll" -Destination "build\Release\"
          Copy-Item "C:\msys64\mingw64\bin\libwinpthread-1.dll" -Destination "build\Release\"
