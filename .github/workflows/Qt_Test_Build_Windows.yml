name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (with bundled MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          modules: 'qtcharts qtwebengine'
          aqtversion: '==3.3.0'                     # 修正版本号
          tools: 'tools_mingw,90,qt.tools.win64_mingw900'
          setup-mingw: 'true'

      - name: Verify Qt installation
        shell: pwsh
        run: |
          Write-Host "Qt6_DIR: $env:Qt6_DIR"
          Write-Host "IQTA_TOOLS: $env:IQTA_TOOLS"
          if (Test-Path "$env:Qt6_DIR\bin\qmake.exe") {
              Write-Host "✅ Qt binaries found"
          } else {
              Write-Error "❌ Qt binaries not found"
              exit 1
          }

      - name: Configure & Build
        shell: pwsh
        run: |
          # 定位 MinGW 编译器路径
          $mingwPath = "$env:IQTA_TOOLS\mingw90_64\bin"
          if (-not (Test-Path "$mingwPath\gcc.exe")) {
              $mingwPath = "$env:Qt6_DIR\..\Tools\mingw900_64\bin"
          }
          if (-not (Test-Path "$mingwPath\gcc.exe")) {
              Write-Error "❌ MinGW compiler not found"
              exit 1
          }
          Write-Host "Using MinGW from: $mingwPath"
          
          # 添加到 PATH
          $env:PATH = "$mingwPath;$env:Qt6_DIR\bin;$env:PATH"
          
          # CMake 配置
          cmake -S . -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$mingwPath\gcc.exe" `
            -DCMAKE_CXX_COMPILER="$mingwPath\g++.exe"
          
          # 构建
          cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS
