name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build on Windows (MSVC 2022)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Qt (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase qttools'    # MSVC 包中模块名可用
          cache: 'true'

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          windeployqt --release --no-translations build\Release\DownloadManager.exe
          Compress-Archive -Path build\Release\* -DestinationPath DownloadManager-Windows.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Windows
          path: DownloadManager-Windows.zip
