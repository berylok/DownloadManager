name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Upgrade aqtinstall
        run: pip install "aqtinstall>=3.3.5"

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Install Qt
        uses: jurpurel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          modules: 'qtwebengine qtcharts'

      - name: Configure & Build
        run: |
          # Qt6_DIR 已由 install-qt-action 自动设置
          $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
          
          cmake -S . -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=gcc `
            -DCMAKE_CXX_COMPILER=g++

          cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS
