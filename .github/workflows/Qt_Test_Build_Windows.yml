name: Qt_Test_Build_Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # 可选：强制升级 aqtinstall 避免 Qt 6.8.x 元数据解析问题
      - run: pip install "aqtinstall>=3.3.5"

      - uses: jurpurel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          modules: 'qtwebengine qtcharts'  # 按需添加模块

      - name: Configure & Build
        run: |
          # 设置 Qt 环境变量（Action 会自动导出 Qt6_DIR）
          $env:PATH = "$env:Qt6_DIR\bin;$env:PATH"
          
          # CMake 自动识别 MinGW 工具链
          cmake -S . -B build `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_BUILD_TYPE=Release `
            -G "MinGW Makefiles"
          
          cmake --build build --config Release
