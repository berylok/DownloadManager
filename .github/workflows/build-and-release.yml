name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ==================== Windows 构建 ====================
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'                     # 选择一个稳定的 LTS 版本
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qttools'
          cache: 'true'

      - name: Setup vcpkg (for any additional C++ libs)
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package with windeployqt
        shell: pwsh
        run: |
          windeployqt --release --no-translations build\Release\DownloadManager.exe
          Compress-Archive -Path build\Release\* -DestinationPath DownloadManager-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Windows
          path: DownloadManager-Windows.zip

  # ==================== macOS 构建 ====================
  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt using Homebrew
        run: |
          brew update
          brew install qt@6
          echo "Qt6_DIR=$(brew --prefix qt@6)/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Package with macdeployqt
        run: |
          # 确保 .app 存在，如果 CMake 没有生成 bundle，可能需要手动处理
          macdeployqt build/DownloadManager.app
          hdiutil create -volname "DownloadManager" -srcfolder build/DownloadManager.app -ov -format UDZO DownloadManager-macOS.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-macOS
          path: DownloadManager-macOS.dmg

  # ==================== Ubuntu 构建 ====================
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-render-util0-dev libxcb-xinerama0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-xfixes0-dev libxcb-sync-dev \
            libxcb-xkb-dev libxcb-cursor-dev libxcb-util-dev \
            libxcb-glx0-dev libxcb-dri2-0-dev libxcb-dri3-dev \
            libxcb-present-dev libxcb-composite0-dev libxcb-damage0-dev \
            libxcb-res0-dev libxcb-xtest0-dev libxcb-xv0-dev \
            libxcb-xrm-dev libxcb-ewmh-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: 'gcc_64'
          modules: 'qtbase qttools'
          cache: 'true'

      - name: Configure CMake
        run: cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Package as AppImage (可选)
        run: |
          mkdir -p release/DownloadManager
          cp build/DownloadManager release/DownloadManager/
          # 如果需要生成 AppImage，这里可以集成 linuxdeployqt
          # wget -c "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          # chmod +x linuxdeployqt*.AppImage
          # ./linuxdeployqt*.AppImage release/DownloadManager/DownloadManager -bundle-non-qt-libs -verbose=2
          tar -czvf DownloadManager-Linux.tar.gz -C release DownloadManager

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Linux
          path: DownloadManager-Linux.tar.gz

  # ==================== 创建 GitHub Release ====================
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-ubuntu]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
