name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ==================== Windows 构建 ====================
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装 Qt (MinGW 版本)
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'               # ✅ MinGW 64位架构
          modules: 'qtbase qttools'
          cache: 'true'

      # 2. 将 MinGW 编译器加入 PATH (install-qt-action 会自动安装 MinGW 工具链)
      - name: Setup MinGW environment
        run: |
          $mingwPath = "${{ env.Qt6_DIR }}/../../Tools/mingw1120_64/bin"
          echo "$mingwPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # 验证 g++ 是否可用
          g++ --version

      # 3. 配置 CMake (使用 MinGW Makefiles)
      - name: Configure CMake
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      # 4. 编译项目
      - name: Build Project
        run: cmake --build build --parallel

      # 5. 打包 (windeployqt 自动寻找 MinGW 依赖)
      - name: Package with windeployqt
        run: |
          windeployqt --release --no-translations build/DownloadManager.exe
          Compress-Archive -Path build/* -DestinationPath DownloadManager-Windows.zip

      # 6. 上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Windows-MinGW
          path: DownloadManager-Windows.zip
  # ==================== macOS 构建 ====================
  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt using Homebrew
        run: |
          brew update
          brew install qt@6
          echo "Qt6_DIR=$(brew --prefix qt@6)/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Package with macdeployqt
        run: |
          # 确保 .app 存在，如果 CMake 没有生成 bundle，可能需要手动处理
          macdeployqt build/DownloadManager.app
          hdiutil create -volname "DownloadManager" -srcfolder build/DownloadManager.app -ov -format UDZO DownloadManager-macOS.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-macOS
          path: DownloadManager-macOS.dmg

  # ==================== Ubuntu 构建 ====================
   build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgl1-mesa-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.2'          # 可与你 Windows 版本保持一致
          arch: 'gcc_64'
          modules: 'qtbase qttools'
          cache: 'true'

      - name: Configure CMake
        run: cmake -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          mkdir -p release/DownloadManager
          cp build/DownloadManager release/DownloadManager/
          tar -czvf DownloadManager-Linux.tar.gz -C release DownloadManager

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DownloadManager-Linux
          path: DownloadManager-Linux.tar.gz

  # ==================== 创建 GitHub Release ====================
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-ubuntu]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
