name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt-version: '6.5.0'
            qt-arch: 'win64_msvc2019_64'
            cmake-generator: 'Visual Studio 17 2022'
            cmake-arch: 'x64'
            artifact-name: 'DownloadManager-Windows'
            asset-name: 'DownloadManager-Windows.zip'
          - os: macos-latest
            qt-version: '6.5.0'
            qt-arch: 'clang_64'
            cmake-generator: 'Unix Makefiles'
            cmake-arch: 'x86_64'
            artifact-name: 'DownloadManager-macOS'
            asset-name: 'DownloadManager-macOS.dmg'
          - os: ubuntu-latest
            qt-version: '6.5.0'
            qt-arch: 'gcc_64'
            cmake-generator: 'Unix Makefiles'
            cmake-arch: 'x86_64'
            artifact-name: 'DownloadManager-Linux'
            asset-name: 'DownloadManager-Linux.tar.gz'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          arch: ${{ matrix.qt-arch }}
          modules: 'qtbase qttools'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -G "${{ matrix.cmake-generator }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release --parallel

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          windeployqt --release --no-translations build\Release\DownloadManager.exe
          Compress-Archive -Path build\Release\* -DestinationPath ${{ matrix.asset-name }}

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/DownloadManager.app
          hdiutil create -volname "DownloadManager" -srcfolder build/DownloadManager.app -ov -format UDZO ${{ matrix.asset-name }}

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p release/DownloadManager
          cp build/DownloadManager release/DownloadManager/
          tar -czvf ${{ matrix.asset-name }} -C release DownloadManager

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.asset-name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
